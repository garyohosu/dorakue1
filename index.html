<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>暁の小径 / Path of Dawn</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      color: #fff;
      font-family: monospace;
      touch-action: none;
      user-select: none;
    }
    #game {
      width: min(100vw, calc(100vh * 4 / 3), 640px);
      aspect-ratio: 4 / 3;
      border: 2px solid #fff;
      box-sizing: border-box;
      touch-action: none;
    }
    #game canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
